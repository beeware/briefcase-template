[dependency-groups]
briefcase = [
    "briefcase @ git+https://github.com/beeware/briefcase",  # provides cookiecutter
]
pre-commit = [
    "pre-commit == 4.6.0",
]
tox = [
    "tox == 4.54.0",
]
verify = [
    "toml == 0.10.2",
    "flake8 == 7.3.0",
]
create-verify = [
    "black == 25.1.0",
    {include-group = "verify"},
]
test = [
    "pytest == 9.0.3",
    {include-group = "briefcase"},
    {include-group = "verify"},
]
dev = [
    {include-group = "briefcase"},
    {include-group = "pre-commit"},
    {include-group = "tox"},
    {include-group = "test"},
]
